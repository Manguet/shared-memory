name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unittest (stdlib uniquement — fastembed est optionnel, le fallback grep couvre)
        run: python3 -m unittest discover -s . -p "test_*.py"
